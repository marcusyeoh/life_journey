<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Game History - Life Journey Pickleball</title>
  <meta name="description" content="Browse and restore previous tournament mixer snapshots and history archives for Life Journey Pickleball.">
  
  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Game History - Life Journey Pickleball">
  <meta property="og:description" content="Browse and restore previous tournament mixer snapshots and history archives.">
  <meta property="og:image" content="https://life-journey-pickle.vercel.app/favicon.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Material Symbols Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="index.css?v=2.4">
  
  <style>
    .history-card {
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-radius: 16px;
      background: var(--surface-high);
      border: 1px solid var(--surface-highest);
    }
    
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .history-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    
    .history-date {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .history-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
      background: rgba(255, 214, 10, 0.05);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 214, 10, 0.15);
    }
    
    .history-stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .history-actions {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
  </style>
  <script>
    // Initialize theme based on preference, defaulting to light mode (daylight)
    (function () {
      var savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>

<body>
  <!-- Theme Toggle Button -->
  <button id="theme-toggle" class="icon-btn theme-toggle-btn neon-glow" aria-label="Toggle theme" style="position: fixed; top: 24px; right: 24px; z-index: 9999; background: var(--surface); border: 1px solid var(--border-gloss); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%); transition: all 0.3s ease; box-shadow: var(--shadow-glass); cursor: pointer;">
    <span class="material-symbols-outlined" id="theme-icon" style="color: var(--text-primary); font-size: 22px; transition: transform 0.4s ease;">dark_mode</span>
  </button>
  <!-- Top Navigation App Bar -->
  <header class="app-bar">
    <button class="icon-btn" id="history-back-btn" aria-label="Go back" onclick="window.history.back()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 id="app-bar-title">Game History</h1>
  </header>

  <main class="screen-view" style="display: block; padding: 24px; max-width: 600px; margin: 0 auto; box-sizing: border-box;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <img src="logo.png" alt="Life Journey Pickleball Logo" class="title-logo" fetchpriority="high">
      <div class="flex-col">
        <p class="label-caps" style="color: var(--neon); letter-spacing: 1.5px; font-size: 11px; margin-bottom: 4px;">ARCHIVE</p>
        <h2 class="title-lg" style="margin: 0; line-height: 1.2;">Saved Games</h2>
      </div>
    </div>
    <p class="subtitle-md" style="margin: 0 0 24px 0; color: var(--text-secondary); font-size: 14px;">View, restore or modify previous tournaments.</p>

    <div id="history-list-container">
      <!-- Injected by history.js -->
      <div style="text-align: center; color: var(--text-secondary); padding: 60px 20px; background: var(--surface); border-radius: 20px; border: 1px dashed var(--surface-highest);">
        <span class="material-symbols-outlined" style="font-size: 32px; animation: pulse 1s infinite;">sync</span>
        <p style="margin-top: 12px; font-weight: 600;">Loading history...</p>
      </div>
    </div>
    
    <div id="load-more-container" style="display: none; text-align: center; margin-top: 24px;">
      <button id="load-more-btn" class="btn-primary" style="background: var(--surface-highest); color: var(--text-primary); border: 1px solid var(--border-gloss); border-radius: 12px; height: 48px; font-weight: 700; width: 100%; max-width: 300px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
        <span class="material-symbols-outlined" style="font-size: 18px;">expand_more</span>
        Load More
      </button>
    </div>
  </main>
  
  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay view-hidden" id="delete-confirm-modal">
    <div class="modal-content neon-glow" style="max-width: 320px; text-align: center; padding: 24px;">
      <div style="width: 48px; height: 48px; border-radius: 24px; background: rgba(248, 113, 113, 0.1); color: var(--red); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
        <span class="material-symbols-outlined" style="font-size: 24px;">warning</span>
      </div>
      <h3 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 800; color: var(--text-primary);">Delete Game?</h3>
      <p style="margin: 0 0 24px 0; font-size: 14px; color: var(--text-secondary); line-height: 1.5;">Are you sure you want to permanently delete this saved game? This action cannot be undone.</p>
      <div style="display: flex; gap: 12px;">
        <button id="cancel-delete-btn" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--surface-highest); background: var(--surface); color: var(--text-primary); font-weight: 700; cursor: pointer; transition: all 0.2s ease;">Cancel</button>
        <button id="confirm-delete-btn" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--red); color: white; font-weight: 700; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);">Delete</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="history.js?v=1.0"></script>
</body>
</html>
